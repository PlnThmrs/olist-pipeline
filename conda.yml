name: olist-ml-env 
channels:
  - conda-forge 
  - defaults 
dependencies: 
  - python=3.10 
  - pip: 
    - marshmallow<3.20.0
    # Azure ML SDK 
    - azure-ai-ml==1.12.0 
    - azure-identity==1.15.0 
    - azureml-mlflow==1.54.0 
    - azureml-inference-server-http==0.8.0
    # Machine Learning 
